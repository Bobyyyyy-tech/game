<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Minecraft Multiplayer</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="/socket.io/socket.io.js"></script>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/PointerLockControls.js"

const socket = io()

// ================= SCENE =================
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x87ceeb)
scene.fog = new THREE.Fog(0x87ceeb, 20, 100)

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000)

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({ antialias:true })
renderer.setSize(window.innerWidth, window.innerHeight)
document.body.appendChild(renderer.domElement)

// Resize fix
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(window.innerWidth, window.innerHeight)
})

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff, 1)
light.position.set(10,20,10)
scene.add(light)

const ambient = new THREE.AmbientLight(0xffffff, 0.4)
scene.add(ambient)

// ================= CONTROLS =================
const controls = new PointerLockControls(camera, document.body)
document.addEventListener("click", ()=>controls.lock())

controls.getObject().position.set(0, 10, 10)
scene.add(controls.getObject())

let keys = {}
document.addEventListener("keydown", e=>keys[e.key]=true)
document.addEventListener("keyup", e=>keys[e.key]=false)

// ================= MATERIALS =================
const materials = {
    1: new THREE.MeshLambertMaterial({color:0x55aa33}), // grass
    2: new THREE.MeshLambertMaterial({color:0x8B4513})  // dirt
}

// ================= WORLD =================
let blocks = {}
function key(x,y,z){ return x+","+y+","+z }

function createBlock(x,y,z,type){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        materials[type]
    )
    mesh.position.set(x,y,z)
    scene.add(mesh)
    blocks[key(x,y,z)] = mesh
}

function removeBlock(x,y,z){
    const k = key(x,y,z)
    if(blocks[k]){
        scene.remove(blocks[k])
        delete blocks[k]
    }
}

// ================= TEST CUBE (DEBUG) =================
const test = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color:0xff0000})
)
test.position.set(0,5,0)
scene.add(test)

// ================= PLAYERS =================
let players = {}
let myId = null

function createPlayer(){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color:0x00ffff})
    )
    scene.add(mesh)
    return mesh
}

// ================= RAYCAST =================
const raycaster = new THREE.Raycaster()

window.addEventListener("mousedown", e=>{
    raycaster.setFromCamera({x:0,y:0}, camera)
    const hits = raycaster.intersectObjects(Object.values(blocks))

    if(hits.length > 0){
        const p = hits[0].object.position
        socket.emit("blockUpdate", {x:p.x,y:p.y,z:p.z,type:0})
    }
})

window.addEventListener("contextmenu", e=>{
    e.preventDefault()

    raycaster.setFromCamera({x:0,y:0}, camera)
    const hits = raycaster.intersectObjects(Object.values(blocks))

    if(hits.length > 0){
        const hit = hits[0]
        const p = hit.object.position
        const n = hit.face.normal

        socket.emit("blockUpdate", {
            x: p.x + n.x,
            y: p.y + n.y,
            z: p.z + n.z,
            type: 1
        })
    }
})

// ================= NETWORK =================
socket.on("init", data=>{
    console.log("World size:", Object.keys(data.world).length)

    myId = data.id

    // world
    for(let k in data.world){
        const [x,y,z] = k.split(",").map(Number)
        createBlock(x,y,z,data.world[k])
    }

    // players
    for(let id in data.players){
        players[id] = createPlayer()
    }
})

socket.on("playerMoved", data=>{
    if(players[data.id]){
        players[data.id].position.set(data.x,data.y,data.z)
    }
})

socket.on("playerJoined", data=>{
    players[data.id] = createPlayer()
})

socket.on("playerLeft", id=>{
    if(players[id]){
        scene.remove(players[id])
        delete players[id]
    }
})

socket.on("blockUpdate", data=>{
    if(data.type === 0){
        removeBlock(data.x,data.y,data.z)
    } else {
        createBlock(data.x,data.y,data.z,data.type)
    }
})

// ================= MOVEMENT =================
function update(){

    const speed = 0.15

    if(keys["w"]) controls.moveForward(speed)
    if(keys["s"]) controls.moveForward(-speed)
    if(keys["a"]) controls.moveRight(-speed)
    if(keys["d"]) controls.moveRight(speed)

    const pos = controls.getObject().position

    if(myId){
        socket.emit("move", {
            x: pos.x,
            y: pos.y,
            z: pos.z
        })
    }
}

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate)
    update()
    renderer.render(scene, camera)
}

animate()

</script>
</body>
</html>
