<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Minecraft Multiplayer</title>
<style>
body{margin:0;overflow:hidden;background:#000;}
</style>
</head>
<body>

<script src="/socket.io/socket.io.js"></script>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/PointerLockControls.js"

const socket = io()

// === Scene ===
const scene = new THREE.Scene()
scene.fog = new THREE.Fog(0x87ceeb, 20, 80)

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth, innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(innerWidth, innerHeight)
})

// === Light ===
const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

// === Controls ===
const controls = new PointerLockControls(camera, document.body)
document.addEventListener("click", ()=>controls.lock())

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

// === Blocks ===
const materials = {
    1: new THREE.MeshLambertMaterial({color:0x55aa33}), // grass
    2: new THREE.MeshLambertMaterial({color:0x8B4513})  // dirt
}

let blocks = {}
let players = {}
let myId = null

function k(x,y,z){ return x+","+y+","+z }

// === Create block with face culling ===
function createBlock(x,y,z,type){

    const geo = new THREE.BoxGeometry(1,1,1)
    const mesh = new THREE.Mesh(geo, materials[type])

    mesh.position.set(x,y,z)
    scene.add(mesh)

    blocks[k(x,y,z)] = mesh
}

// === Remove block ===
function removeBlock(x,y,z){
    const key = k(x,y,z)
    if(blocks[key]){
        scene.remove(blocks[key])
        delete blocks[key]
    }
}

// === Raycast for breaking ===
const raycaster = new THREE.Raycaster()

window.addEventListener("mousedown", e=>{

    raycaster.setFromCamera({x:0,y:0}, camera)
    const intersects = raycaster.intersectObjects(Object.values(blocks))

    if(intersects.length > 0){
        const p = intersects[0].object.position
        socket.emit("blockUpdate", {x:p.x,y:p.y,z:p.z,type:0})
    }
})

// === Place block ===
window.addEventListener("contextmenu", e=>{
    e.preventDefault()

    raycaster.setFromCamera({x:0,y:0}, camera)
    const intersects = raycaster.intersectObjects(Object.values(blocks))

    if(intersects.length > 0){
        const hit = intersects[0]
        const p = hit.object.position
        const n = hit.face.normal

        socket.emit("blockUpdate", {
            x: p.x + n.x,
            y: p.y + n.y,
            z: p.z + n.z,
            type:1
        })
    }
})

// === Players ===
function createPlayer(){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color:0x00ffff})
    )
    scene.add(mesh)
    return mesh
}

// === Networking ===
socket.on("init", data=>{
    myId = data.id

    for(let key in data.world){
        const [x,y,z] = key.split(",").map(Number)
        createBlock(x,y,z,data.world[key])
    }

    for(let id in data.players){
        players[id] = createPlayer()
    }
})

socket.on("playerMoved", data=>{
    if(players[data.id]){
        players[data.id].position.set(data.x,data.y,data.z)
    }
})

socket.on("playerJoined", data=>{
    players[data.id] = createPlayer()
})

socket.on("playerLeft", id=>{
    if(players[id]){
        scene.remove(players[id])
        delete players[id]
    }
})

socket.on("blockUpdate", data=>{
    if(data.type===0){
        removeBlock(data.x,data.y,data.z)
    } else {
        createBlock(data.x,data.y,data.z,data.type)
    }
})

// === Movement ===
function update(){

    const speed = 0.15

    if(keys["w"]) controls.moveForward(speed)
    if(keys["s"]) controls.moveForward(-speed)
    if(keys["a"]) controls.moveRight(-speed)
    if(keys["d"]) controls.moveRight(speed)

    const pos = controls.getObject().position

    if(myId){
        socket.emit("move", pos)
    }
}

// === Loop ===
function animate(){
    requestAnimationFrame(animate)
    update()
    renderer.render(scene, camera)
}

animate()

</script>
</body>
</html>
