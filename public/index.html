<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Multiplayer</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>

<script src="/socket.io/socket.io.js"></script>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/PointerLockControls.js"

const socket = io()

// Scene
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x87ceeb)

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000)

const renderer = new THREE.WebGLRenderer()
renderer.setSize(innerWidth, innerHeight)
document.body.appendChild(renderer.domElement)

// Light
const light = new THREE.DirectionalLight(0xffffff, 1)
light.position.set(5,10,5)
scene.add(light)

// Ground
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshLambertMaterial({ color: 0x228822 })
)
ground.rotation.x = -Math.PI/2
scene.add(ground)

// Controls
const controls = new PointerLockControls(camera, document.body)

document.addEventListener("click", () => controls.lock())

let velocity = new THREE.Vector3()
let keys = {}

document.addEventListener("keydown", e => keys[e.key]=true)
document.addEventListener("keyup", e => keys[e.key]=false)

// Players
let players = {}
let myId = null

function createPlayerMesh(name){
    const group = new THREE.Group()

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshLambertMaterial({ color: 0x00ffff })
    )
    body.position.y = 1
    group.add(body)

    // nametag
    const canvas = document.createElement("canvas")
    const ctx = canvas.getContext("2d")
    canvas.width = 256
    canvas.height = 64

    ctx.fillStyle = "white"
    ctx.font = "30px Arial"
    ctx.fillText(name, 10,40)

    const texture = new THREE.CanvasTexture(canvas)
    const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: texture })
    )

    sprite.scale.set(3,1,1)
    sprite.position.y = 3

    group.add(sprite)

    return group
}

// Networking
socket.on("init", data => {
    myId = data.id

    for(let id in data.players){
        const p = data.players[id]
        const mesh = createPlayerMesh(p.name)

        mesh.position.set(p.x, p.y, p.z)
        scene.add(mesh)

        players[id] = mesh
    }
})

socket.on("playerJoined", data => {
    const mesh = createPlayerMesh(data.player.name)
    scene.add(mesh)
    players[data.id] = mesh
})

socket.on("playerMoved", data => {
    if(players[data.id]){
        players[data.id].position.set(data.x, data.y, data.z)
    }
})

socket.on("playerLeft", id => {
    if(players[id]){
        scene.remove(players[id])
        delete players[id]
    }
})

// Movement
function update(){

    const speed = 0.1

    if(keys["w"]) controls.moveForward(speed)
    if(keys["s"]) controls.moveForward(-speed)
    if(keys["a"]) controls.moveRight(-speed)
    if(keys["d"]) controls.moveRight(speed)

    const pos = controls.getObject().position

    if(myId){
        socket.emit("move", {
            x: pos.x,
            y: pos.y,
            z: pos.z
        })
    }
}

// Loop
function animate(){
    requestAnimationFrame(animate)
    update()
    renderer.render(scene, camera)
}

animate()

</script>

</body>
</html>
